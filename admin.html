<!DOCTYPE html>
<html>
<head>
    <title>Admin - TechStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <div><strong>Admin Panel</strong></div>
        <div>
            <a href="index.html">Retour au site</a>
        </div>
    </nav>
</header>

<div class="container">
    <h1>Gestion des Produits</h1>

    <div class="card">
        <form>
            <label>Nom du produit :</label>
            <input type="text">

            <label>Prix :</label>
            <input type="number">

            <label>Stock :</label>
            <input type="number">

            <button>Ajouter Produit</button>
        </form>
    </div>

    <h2>Liste des produits</h2>

    <table class="table">
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Prix</th>
            <th>Stock</th>
        </tr>
        <tr>
            <td>1</td>
            <td>PC Portable HP</td>
            <td>4500 DH</td>
            <td>5</td>
        </tr>
    </table>

</div>

</body>
</html>
